version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: rugram_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rugram_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rugram_password}
      POSTGRES_DB: ${DB_NAME:-rugram_db}
    ports:
      - '5432:5432'
    volumes:
      - rugram_postgres_data:/var/lib/postgresql/data
    networks:
      - rugram_network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-rugram_user} -d ${DB_NAME:-rugram_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rugram_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - rugram_redis_data:/data
    networks:
      - rugram_network
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    healthcheck:
      test:
        ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: rugram_api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-rugram_user}
      DB_PASSWORD: ${DB_PASSWORD:-rugram_password}
      DB_NAME: ${DB_NAME:-rugram_db}
      APP_PORT: ${APP_PORT:-4200}
      APP_ENV: ${APP_ENV:-development}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      CACHE_TTL_DEFAULT: ${CACHE_TTL_DEFAULT:-300}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-default_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-default_refresh_secret}
    ports:
      - '${APP_PORT:-4200}:${APP_PORT:-4200}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rugram_network
    volumes:
      - ./internal/database/migrations:/app/internal/database/migrations

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rugram_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - '5050:80'
    networks:
      - rugram_network
    depends_on:
      - postgres

volumes:
  rugram_postgres_data:
  rugram_redis_data:

networks:
  rugram_network:
    driver: bridge
