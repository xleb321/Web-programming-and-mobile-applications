version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: rugram_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-rugram_user}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-rugram_password}
    ports:
      - '27017:27017'
    volumes:
      - rugram_mongo_data:/data/db
    networks:
      - rugram_network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo-express:
    image: mongo-express:latest
    container_name: rugram_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_USER:-rugram_user}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_PASSWORD:-rugram_password}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin_password
    ports:
      - '8081:8081'
    networks:
      - rugram_network
    depends_on:
      - mongo

  redis:
    image: redis:7-alpine
    container_name: rugram_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - rugram_redis_data:/data
    networks:
      - rugram_network
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_password}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redisinsight:
    image: redis/redisinsight:latest
    container_name: rugram_redisinsight
    restart: unless-stopped
    ports:
      - '5540:5540'
    volumes:
      - rugram_redisinsight_data:/data
    networks:
      - rugram_network

  minio:
    image: minio/minio:latest
    container_name: rugram_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secure_password}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - rugram_minio_data:/data
    networks:
      - rugram_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rugram_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rugram_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rugram_password}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rugram_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rugram_network
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: rugram_api
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://rugram_user:rugram_password@mongo:27017/rugram_db?authSource=admin}
      DB_NAME: ${DB_NAME:-rugram_db}
      APP_PORT: ${APP_PORT:-4200}
      APP_ENV: ${APP_ENV:-development}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      CACHE_TTL_DEFAULT: ${CACHE_TTL_DEFAULT:-300}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-default_access_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-default_refresh_secret}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI:-}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      VK_REDIRECT_URI: ${VK_REDIRECT_URI:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secure_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-rugram-files}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-rugram_user}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-rugram_password}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-true}
    ports:
      - '${APP_PORT:-4200}:${APP_PORT:-4200}'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rugram_network

volumes:
  rugram_mongo_data:
  rugram_redis_data:
  rugram_redisinsight_data:
  rugram_minio_data:
  rugram_rabbitmq_data:

networks:
  rugram_network:
    driver: bridge