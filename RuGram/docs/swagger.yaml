basePath: /api/v1
definitions:
  dto.CreatePostRequest:
    description: Данные для создания поста
    properties:
      description:
        example: Это описание моего первого поста
        maxLength: 1000
        type: string
      image_url:
        example: https://example.com/image.jpg
        type: string
      status:
        enum:
        - active
        - draft
        - archived
        example: active
        type: string
      title:
        example: Мой первый пост
        maxLength: 200
        minLength: 1
        type: string
      user_id:
        example: 507f1f77bcf86cd799439011
        type: string
    required:
    - title
    - user_id
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: SecurePass123
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      message:
        example: login successful
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.MetaData:
    properties:
      limit:
        example: 10
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 100
        type: integer
      totalPages:
        example: 10
        type: integer
    type: object
  dto.PaginationResponse:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/dto.MetaData'
    type: object
  dto.PostResponse:
    description: Информация о посте
    properties:
      created_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      description:
        example: Это описание поста
        type: string
      id:
        example: 507f1f77bcf86cd799439011
        type: string
      image_url:
        example: https://example.com/image.jpg
        type: string
      likes_count:
        example: 5
        type: integer
      status:
        example: active
        type: string
      title:
        example: Мой первый пост
        type: string
      updated_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      user_id:
        example: 507f1f77bcf86cd799439011
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: SecurePass123
        minLength: 6
        type: string
      phone:
        example: "+79991234567"
        type: string
    required:
    - email
    - password
    type: object
  dto.UpdatePostRequest:
    description: Данные для обновления поста
    properties:
      description:
        example: Обновленное описание
        maxLength: 1000
        type: string
      image_url:
        example: https://example.com/new-image.jpg
        type: string
      status:
        enum:
        - active
        - draft
        - archived
        example: draft
        type: string
      title:
        example: Обновленный заголовок
        maxLength: 200
        minLength: 1
        type: string
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        example: newemail@example.com
        type: string
      password:
        example: NewSecurePass456
        type: string
      phone:
        example: "+79998887766"
        type: string
    type: object
  dto.UserResponse:
    properties:
      created_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      email:
        example: user@example.com
        type: string
      id:
        example: 507f1f77bcf86cd799439011
        type: string
      phone:
        example: "+79991234567"
        type: string
      updated_at:
        example: "2024-01-01T12:00:00Z"
        type: string
    type: object
  dto.WhoamiResponse:
    properties:
      email:
        example: user@example.com
        type: string
      id:
        example: 507f1f77bcf86cd799439011
        type: string
      phone:
        example: "+79991234567"
        type: string
    type: object
  utils.ErrorResponseStruct:
    description: Ответ с ошибкой
    properties:
      error:
        example: Invalid request data
        type: string
      success:
        example: false
        type: boolean
    type: object
  utils.StandardResponse:
    description: Стандартный ответ API
    properties:
      data: {}
      message:
        example: Operation successful
        type: string
      success:
        example: true
        type: boolean
    type: object
host: localhost:4200
info:
  contact:
    email: support@rugram.com
    name: Gleb, Pavel
  description: |-
    Документация API для RuGram - социальной сети для обмена постами
    Поддерживает JWT аутентификацию, OAuth2 (Яндекс, ВКонтакте), Redis кеширование и MongoDB
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: RuGram API
  version: 1.0.0
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Аутентифицирует пользователя и устанавливает JWT токены в cookies
      parameters:
      - description: Учетные данные пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный вход
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "401":
          description: Неверный email или пароль
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      summary: Вход в систему
      tags:
      - Auth
  /auth/logout:
    post:
      description: Отзывает текущий access токен и очищает cookies
      responses:
        "200":
          description: Успешный выход
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                message:
                  type: string
              type: object
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Выход из текущей сессии
      tags:
      - Auth
  /auth/logout-all:
    post:
      description: Отзывает все токены пользователя и очищает cookies
      responses:
        "200":
          description: Выход из всех сессий выполнен
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                message:
                  type: string
              type: object
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Выход из всех сессий
      tags:
      - Auth
  /auth/oauth/vk:
    get:
      description: Перенаправляет пользователя на страницу авторизации ВКонтакте
      responses:
        "302":
          description: Редирект на страницу авторизации ВКонтакте
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      summary: Инициация OAuth2 через ВКонтакте
      tags:
      - OAuth
  /auth/oauth/vk/callback:
    get:
      description: Обрабатывает callback от OAuth2 провайдера ВКонтакте и устанавливает
        сессию
      parameters:
      - description: Код авторизации от ВКонтакте
        in: query
        name: code
        required: true
        type: string
      - description: State параметр для защиты от CSRF
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Редирект на фронтенд с установленными cookies
        "400":
          description: Неверный state параметр
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      summary: Обработка callback от ВКонтакте
      tags:
      - OAuth
  /auth/oauth/yandex:
    get:
      description: Перенаправляет пользователя на страницу авторизации Яндекса
      responses:
        "302":
          description: Редирект на страницу авторизации Яндекса
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      summary: Инициация OAuth2 через Яндекс
      tags:
      - OAuth
  /auth/oauth/yandex/callback:
    get:
      description: Обрабатывает callback от OAuth2 провайдера Яндекса и устанавливает
        сессию
      parameters:
      - description: Код авторизации от Яндекса
        in: query
        name: code
        required: true
        type: string
      - description: State параметр для защиты от CSRF
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Редирект на фронтенд с установленными cookies
        "400":
          description: Неверный state параметр
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      summary: Обработка callback от Яндекса
      tags:
      - OAuth
  /auth/refresh:
    post:
      description: Обновляет access и refresh токены с использованием refresh токена
        из cookie
      produces:
      - application/json
      responses:
        "200":
          description: Новые токены установлены
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "401":
          description: Refresh токен отсутствует или недействителен
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      summary: Обновление токенов
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя с указанными email, паролем и опционально
        телефоном
      parameters:
      - description: Данные для регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Пользователь успешно создан
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Неверный формат запроса или email уже существует
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      summary: Регистрация нового пользователя
      tags:
      - Auth
  /auth/whoami:
    get:
      description: Возвращает данные аутентифицированного пользователя
      produces:
      - application/json
      responses:
        "200":
          description: Данные пользователя
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.WhoamiResponse'
              type: object
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Получение информации о текущем пользователе
      tags:
      - Auth
  /posts:
    get:
      description: Возвращает список всех активных постов с пагинацией
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Количество элементов на странице
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список постов
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginationResponse'
              type: object
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Получение списка постов
      tags:
      - Posts
    post:
      consumes:
      - application/json
      description: Создает новый пост с указанными данными
      parameters:
      - description: Данные для создания поста
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreatePostRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Пост успешно создан
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PostResponse'
              type: object
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Создание нового поста
      tags:
      - Posts
  /posts/{id}:
    delete:
      description: Помечает пост как удаленный (soft delete)
      parameters:
      - description: ID поста (ObjectId)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Пост успешно удален
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "404":
          description: Пост не найден
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Удаление поста (soft delete)
      tags:
      - Posts
    get:
      description: Возвращает информацию о посте по его ID
      parameters:
      - description: ID поста (ObjectId)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Информация о посте
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PostResponse'
              type: object
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "404":
          description: Пост не найден
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Получение поста по ID
      tags:
      - Posts
    patch:
      consumes:
      - application/json
      description: Обновляет данные поста (PUT/PATCH)
      parameters:
      - description: ID поста (ObjectId)
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Пост успешно обновлен
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PostResponse'
              type: object
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "404":
          description: Пост не найден
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Обновление поста
      tags:
      - Posts
    put:
      consumes:
      - application/json
      description: Обновляет данные поста (PUT/PATCH)
      parameters:
      - description: ID поста (ObjectId)
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Пост успешно обновлен
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PostResponse'
              type: object
        "400":
          description: Неверный формат запроса
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "404":
          description: Пост не найден
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Обновление поста
      tags:
      - Posts
  /posts/user/{userId}:
    get:
      description: Возвращает все посты указанного пользователя с пагинацией
      parameters:
      - description: ID пользователя (ObjectId)
        in: path
        name: userId
        required: true
        type: string
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Количество элементов на странице
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список постов пользователя
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginationResponse'
              type: object
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Получение постов пользователя
      tags:
      - Posts
  /users:
    get:
      description: Возвращает список всех активных пользователей с пагинацией
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Количество элементов на странице
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список пользователей
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginationResponse'
              type: object
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Получение списка пользователей
      tags:
      - Users
  /users/{id}:
    delete:
      description: Помечает пользователя как удаленного (только свою учетную запись)
      parameters:
      - description: ID пользователя (ObjectId)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Пользователь успешно удален
        "401":
          description: Не аутентифицирован
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "403":
          description: Доступ запрещен
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - CookieAuth: []
      summary: Удаление пользователя (soft delete)
      tags:
      - Users
    get:
      description: Возвращает информацию о пользователе (только свои данные)
      parameters:
      - description: ID пользователя (ObjectId)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Информация о пользователе
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "401":
          description: Не аутентифицирован
