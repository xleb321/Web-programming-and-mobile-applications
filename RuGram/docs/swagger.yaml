basePath: /api/v1
definitions:
  dto.MetaData:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.PaginationResponse:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/dto.MetaData'
    type: object
  dto.ProfileResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  dto.UpdateProfileRequest:
    properties:
      avatar_file_id:
        type: string
      bio:
        type: string
      display_name:
        type: string
      email:
        type: string
      phone:
        type: string
    type: object
  dto.UploadFileResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      mime_type:
        type: string
      original_name:
        type: string
      size:
        type: integer
    type: object
  utils.ErrorResponseStruct:
    properties:
      error:
        type: string
      success:
        type: boolean
    type: object
  utils.StandardResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:4200
info:
  contact:
    email: support@rugram.com
    name: Gleb, Pavel
  description: API для социальной сети с поддержкой JWT аутентификации, MinIO файлового
    хранилища, RabbitMQ асинхронной обработки и MongoDB
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: RuGram API
  version: "4.0"
paths:
  /api/v1/files:
    get:
      description: Возвращает список файлов пользователя с пагинацией
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 10
        description: Лимит на странице
        in: query
        name: limit
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.PaginationResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - BearerAuth: []
      summary: Получить мои файлы
      tags:
      - Files
    post:
      consumes:
      - multipart/form-data
      description: Загружает файл в MinIO и сохраняет метаданные
      parameters:
      - description: Файл для загрузки (изображение или PDF)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.UploadFileResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - BearerAuth: []
      summary: Загрузить файл
      tags:
      - Files
  /api/v1/files/{id}:
    delete:
      description: Удаляет файл (soft delete + из MinIO)
      parameters:
      - description: ID файла
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - BearerAuth: []
      summary: Удалить файл
      tags:
      - Files
    get:
      description: Скачивает файл по ID (только владелец)
      parameters:
      - description: ID файла
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - BearerAuth: []
      summary: Скачать файл
      tags:
      - Files
  /api/v1/profile:
    get:
      description: Возвращает профиль текущего авторизованного пользователя
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ProfileResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - BearerAuth: []
      summary: Получить профиль текущего пользователя
      tags:
      - Profile
    post:
      consumes:
      - application/json
      description: Обновляет профиль (displayName, bio, avatar)
      parameters:
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ProfileResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseStruct'
      security:
      - BearerAuth: []
      summary: Обновить профиль текущего пользователя
      tags:
      - Profile
securityDefinitions:
  BearerAuth:
    description: JWT access token stored in cookie
    in: cookie
    name: access_token
    type: apiKey
swagger: "2.0"
